# 局部路径规划配置: 在自主建图功能中由于地图不完整，所以在建土的过程中更多的是依赖于局部路径规划。
# DWA算法流程:
#   1) 将机器人的控制空间离散化（dx,dy,dtheta）,即在速度空间之中进行速度采样
#   2) 对于每一个采样速度，从机器人的当前状态执行正向模拟，以预测如果在短时间段内采用采样速度将会发生什么,消除不良的轨迹(可能会发生碰撞的轨迹)
#   3) 评估从正向模拟产生的每个轨迹使用包含诸如：障碍物接近度、目标接近度、全局路径接近度和速度等特征的度量，丢弃非法轨迹（与障碍物相撞的轨迹）.输出轨迹得分
#   4) 选择得分最高的轨迹，将相关联的速度发送给移动基站
#   5) 清零然后重复以上过程

# DWA非常依赖代价地图, 因此设置好代价地图参数对DWA本地规划至关重要。
DWAPlannerROS:
  # 配置机器人速度参数
  controller_frequency: 3.0       # 路径规划频率（s）
  acc_lim_x: 1.2                  # 最大x方向的加速度（<=2）
  acc_lim_y: 0                    # 最大y方向的加速度(全向移动的机器人才有)
  acc_lim_theta: 2.4              # 最大旋转加速度
  
  max_vel_x: 0.2                  # x方向最大速度的绝对值
  min_vel_x: -0.15                 # x方向最小值绝对值,如果为负值表示可以后退(别太快，后退没有全局路径，容易撞)
  max_vel_y: 0.0                  # 只有全向机器人设置y轴速度
  min_vel_y: 0.0
  escape_vel: -0.2                # 机器人逃时速度。必须为负数，这样才能反向移动。(别太快，后退没有全局路径，容易撞)

  max_vel_trans: 0.2              #机器人最大平移速度的绝对值，单位为 m/s
  min_vel_trans: 0.1              #机器人最小平移速度的绝对值，单位为 m/s | 注意不要设置为0，否则DWA认为平移速度不可忽略，将创建较小的旋转速度
  trans_stopped_vel: 0.1          #机器人被认属于“停止”状态时的平移速度。如果机器人的速度低于该值，则认为机器人已停止。单位为 m/s

  max_rotation_vel: 0.5           # 最大旋转速度
  min_in_place_vel_theta: 0.3     # 最小旋转速度

  max_vel_theta: 0.5              # 机器人的最大旋转角速度的绝对值，单位为 rad/s 
  min_vel_theta: 0.3              # 机器人的最小旋转角速度的绝对值，单位为 rad/s
  theta_stopped_vel: 0.1          # 机器人被认属于“停止”状态时的旋转速度。单位为 rad/s

  # 目标距离公差参数（导航精度）
  yaw_goal_tolerance: 0.1         # 到达目标点时偏行角允许的误差：rad
  xy_goal_tolerance: 0.1          # 到达目标点时，在xy平面内与目标点的距离误差
  latch_xy_goal_tolerance: false  # 设置为true,如果到达容错距离内,机器人就会原地旋转,即使转动是会跑出容错距离外

  # 正向仿真参数
  sim_time: 1.0                   # 向前仿真轨迹的时间(s),仿真时间越长，计算负荷越大，规划路径的时间越长
  sim_granularity: 0.05           # 仿真粒度颗粒度：轨迹上采样点之间的距离,轨迹上点的密集程度（default:0.025）
  vx_samples: 10                  # x方向速度空间的采样点数
  vy_samples: 0                   # y方向速度空间采样点数：Y轴速度=0，没必要采样
  vth_samples: 20                 # 旋转方向的速度空间采样点数，通常旋转比直线前进更复杂，应多于位移采样

  # 轨迹控制参数（速度）
  path_distance_bias: 64.0        # 本地规划器与全局路径保持一致的权重：较大的值将使本地规划器更倾向于跟踪全局路径
  goal_distance_bias: 20.0        # 机器人尝试到达目标点的权重：增大将会使机器人与全局路径的一致性偏低
  occdist_scale: 0.03             # 机器人尝试躲避障碍物的权重：增大将导致机器人陷入困境
  forward_point_distance: 0.325   # 定义控制器前进点的距离
  stop_time_buffer: 0.2           # 为防止碰撞,机器人必须提前停止的时间长度
  scaling_speed: 0.3              # 启动机器人底盘的速度
  max_scaling_factor: 0.2         # 最大缩放参数

  # 震荡恢复
  oscillation_reset_dist: 0.1    # 机器人运动多远距离才会重置振荡标记。这有助于避免因机器人在路径上小幅振动而无法前进的情况。

  # 调试参数
  # prune_plan: false             # 机器人前进是否清除身后1m外的轨迹
  
  # Debugging 调试参数
  # publish_traj_pc : true          # 将规划的轨迹在RVIZ上进行可视化
  # publish_cost_grid_pc: true      # 是否发布规划器在规划路径时的代价网格

  #global_frame_id: odom_ekf      # 全局参考坐标系为odom
 

# holonomic_robot: false          #是否为全向机器人。 值为false时为差分机器人； 为true时表示全向机器人
   

