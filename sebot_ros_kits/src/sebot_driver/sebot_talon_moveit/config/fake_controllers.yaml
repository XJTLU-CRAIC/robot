controller_list:
  - name: fake_arm_controller
    type: $(arg fake_execution_type)
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
  - name: fake_gripper_controller
    type: $(arg fake_execution_type)
    joints:
      - joint_5
      - joint_6
      - joint_8
initial:  # Define initial robot poses.
  - group: arm
    pose: home
  - group: gripper
    pose: catch